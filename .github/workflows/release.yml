name: ⚡ Release

on:
  workflow_run:
    workflows: ['⚡ Code quality']
    branches: [main]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    name: 🛩️ Release & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛰️ Release please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          config-file: release-please/config.json
          manifest-file: release-please/manifest.json

      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.release_created }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
        if: ${{ steps.release.outputs.release_created }}

      - name: ⎔ Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - name: 📥 Install deps
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: ⚙️ Building package
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm build

      - name: 🚀 Publish package
        id: publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          NODE_AUTH_TOKEN: ''  # Clear placeholder set by setup-node to enable OIDC
        run: npm publish ./dist --access public --provenance

